<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARCHVIZ PORTFOLIO</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#111;
color:#fff;
text-align:center;
}

h1{
margin-top:60px;
font-size:40px;
}

h2{
margin-top:60px;
font-weight:400;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
max-width:1000px;
margin:40px auto;
padding:0 20px;
}

.card{
background:#1b1b1b;
border-radius:10px;
overflow:hidden;
border:1px solid #333;
}

.card a{
color:white;
text-decoration:none;
display:block;
}

.card img{
width:100%;
display:block;
}

.card-title{
padding:12px;
font-weight:600;
}

.buttons{
padding:10px;
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
background:#00aaff;
color:white;
cursor:pointer;
}

button:hover{
background:#008ecc;
}

footer{
margin:80px 0 30px;
font-size:12px;
color:#777;
}
</style>

</head>

<body>

<h1>ARCHVIZ PORTFOLIO</h1>

<h2>360 Panorama</h2>

<div class="grid">

<div class="card">
<a href="pano/apt0/" target="_blank">
<img src="thumb/apt0.jpg">
<div class="card-title">APT0</div>
</a>
<div class="buttons">
<button onclick="copyLink('pano/apt0/')">COPY LINK</button>
</div>
</div>

<div class="card">
<a href="pano/apt1/" target="_blank">
<img src="thumb/apt1.jpg">
<div class="card-title">APT1</div>
</a>
<div class="buttons">
<button onclick="copyLink('pano/apt1/')">COPY LINK</button>
</div>
</div>

<div class="card">
<a href="pano/apt2/" target="_blank">
<img src="thumb/apt2.jpg">
<div class="card-title">APT2</div>
</a>
<div class="buttons">
<button onclick="copyLink('pano/apt2/')">COPY LINK</button>
</div>
</div>

<div class="card">
<a href="pano/apt3/" target="_blank">
<img src="thumb/apt3.jpg">
<div class="card-title">APT3</div>
</a>
<div class="buttons">
<button onclick="copyLink('pano/apt3/')">COPY LINK</button>
</div>
</div>

<div class="card">
<a href="pano/apt4/" target="_blank">
<img src="thumb/apt4.jpg">
<div class="card-title">APT4</div>
</a>
<div class="buttons">
<button onclick="copyLink('pano/apt4/')">COPY LINK</button>
</div>
</div>

</div>

<h2>Video</h2>

<div class="grid">

<div class="card">
<a href="video/render1.mp4" target="_blank">
<img src="thumb/video1.jpg">
<div class="card-title">VIDEO01</div>
</a>
<div class="buttons">
<button onclick="copyLink('video/render1.mp4')">COPY LINK</button>
</div>
</div>

<div class="card">
<a href="video/render2.mp4" target="_blank">
<img src="thumb/video2.jpg">
<div class="card-title">VIDEO02</div>
</a>
<div class="buttons">
<button onclick="copyLink('video/render2.mp4')">COPY LINK</button>
</div>
</div>

</div>

<footer>
Powered by GitHub + Vercel
</footer>

<script>
function copyLink(path){
const url = window.location.origin + "/" + path;
navigator.clipboard.writeText(url);
alert("링크 복사됨: " + url);
}
</script>

</body>
</html>
